name: test
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        jobtype: [1, 2, 3]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 17
        cache: sbt
    - uses: sbt/setup-sbt@v1
    - name: Build and test (sbt 1.x)
      if: ${{ matrix.jobtype == 1 }}
      shell: bash
      run: |
        sbt --client "++2.12.x; test ; scripted"
    - name: Build and test (sbt 2.x)
      if: ${{ matrix.jobtype == 2 }}
      shell: bash
      run: |
        sbt --client "++3.x; test ; scripted"
    - name: Mima
      if: ${{ matrix.jobtype == 3 }}
      shell: bash
      run: |
        sbt --client mimaReportBinaryIssues
    - name: Cleanup
      shell: bash
      run: |
        rm -rf "$HOME/.ivy2/local" || true
